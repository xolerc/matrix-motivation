name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Generate Android project
        run: |
          rm -rf android ios
          flutter create --project-name matrix_motivation --platforms android .
          flutter pub get

      - name: Apply lock screen permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          python3 << 'PYEOF'
import re
with open("android/app/src/main/AndroidManifest.xml", "r") as f:
    content = f.read()

perms = '''    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
    <uses-permission android:name="android.permission.VIBRATE"/>
    <uses-permission android:name="android.permission.WAKE_LOCK"/>
    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>
    <uses-permission android:name="android.permission.USE_EXACT_ALARM"/>
'''

content = content.replace("    <application", perms + "    <application")
content = content.replace(
    'android:hardwareAccelerated="true">',
    'android:hardwareAccelerated="true" android:showWhenLocked="true" android:showOnLockScreen="true" android:turnScreenOn="true">'
)

with open("android/app/src/main/AndroidManifest.xml", "w") as f:
    f.write(content)
print("Manifest updated")
PYEOF

      - name: Build APK
        run: flutter build apk --release

      - name: Sign APK
        run: |
          APK="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK" ]; then
            mv "$APK" "MatrixMotivation-v1.0.apk"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Matrix Motivation v1.0.${{ github.run_number }}
          body: |
            ## MATRIX MOTIVATION APK
            
            - Avtomatik build
            - Bloklangan ekranda notification
            - Matrix rain effekt
            - 48 ta o'zbekcha motivatsion xabarlar
            
            Yuklab olish uchun pastdagi .apk faylni bosing.
          files: MatrixMotivation-v1.0.apk
          generate_release_notes: false
